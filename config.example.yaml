log:
  level: info

runner:
  file: .runner
  capacity: 1
  envs: {}
  env_file: .env
  timeout: 3h
  shutdown_timeout: 0s
  insecure: false
  fetch_timeout: 5s
  fetch_interval: 2s
  fetch_interval_max: 60s
  log_report_interval: 5s
  log_report_max_latency: 3s
  log_report_batch_size: 100
  state_report_interval: 5s
  github_mirror: ''
  labels:
    - "full:docker://gitea-runner-full:latest"

cache:
  enabled: true
  dir: ""
  host: ""
  port: 0
  external_server: ""
  external_secret: ""

container:
  network: ""
  privileged: false
  options:
  workdir_parent:
  valid_volumes: []
  docker_host: ""
  force_pull: true
  force_rebuild: false
  require_docker: false
  docker_timeout: 0s
  bind_workdir: false

host:
  workdir_parent:

metrics:
  enabled: false
  addr: "127.0.0.1:9101"
